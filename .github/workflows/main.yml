name: build-windows

on:
  workflow_dispatch:
  push:
    branches: [ main, master, ctf-dynamic-minecraft-version ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    # Pin to the VS 2022 runner. windows-latest may move to a newer image where
    # the "Visual Studio 17 2022" CMake generator is not available.
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild / Visual Studio 2022
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'

      - name: Verify Visual Studio 2022
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (!(Test-Path $vswhere)) {
            throw "vswhere.exe not found. Visual Studio Build Tools are not available on this runner."
          }

          $installPath = & $vswhere -version '[17.0,18.0)' -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          if ([string]::IsNullOrWhiteSpace($installPath)) {
            throw "Visual Studio 2022 with VC++ x64 tools was not found on this runner."
          }

          Write-Host "Visual Studio 2022 found at: $installPath"
          cmake --version
          msbuild -version

      - name: Configure C++ DLLs
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build C++ DLLs
        shell: pwsh
        run: cmake --build build --config Release -- /m

      - name: Publish GUI
        shell: pwsh
        run: dotnet publish tools\CTFInstallerGui\CTFInstallerGui.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o release\gui

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release\payload -Force | Out-Null
          Copy-Item build\Release\vcruntime140_1.dll release\payload\vcruntime140_1.dll -Force
          Copy-Item build\Release\ctf_patch_module.dll release\payload\ctf_patch_module.dll -Force
          Copy-Item README.md release\README.md -Force
          Copy-Item tools\CTFInstallerGui\README.md release\GUI_README.md -Force
          $hashPath = Join-Path (Resolve-Path release) "SHA256SUMS.txt"
          $tmpHashPath = Join-Path (Resolve-Path release) "SHA256SUMS.tmp"
          Remove-Item $hashPath, $tmpHashPath -Force -ErrorAction SilentlyContinue

          $releaseRoot = (Resolve-Path release).Path
          $lines = Get-ChildItem release -Recurse -File |
            Where-Object { $_.FullName -ne $hashPath -and $_.FullName -ne $tmpHashPath } |
            Sort-Object FullName |
            ForEach-Object {
              $hash = (Get-FileHash -LiteralPath $_.FullName -Algorithm SHA256).Hash
              $rel = $_.FullName.Substring($releaseRoot.Length + 1).Replace('\\', '/')
              "$hash  $rel"
            }

          $lines | Set-Content -Path $tmpHashPath -Encoding utf8
          Move-Item -LiteralPath $tmpHashPath -Destination $hashPath -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mc_ctf_clean_gui_release
          path: release
