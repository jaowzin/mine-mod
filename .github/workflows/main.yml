name: build-windows

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build x64 DLLs
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        shell: pwsh
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build Release
        shell: pwsh
        run: cmake --build build --config Release -- /m

      - name: Prepare artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path out -Force | Out-Null
          Copy-Item build\Release\vcruntime140_1.dll out\vcruntime140_1.dll -Force
          Copy-Item build\Release\ctf_patch_module.dll out\ctf_patch_module.dll -Force
          Copy-Item src\proxy\vcruntime140_1.def out\vcruntime140_1.def -Force
          Get-ChildItem out | Get-FileHash -Algorithm SHA256 | Out-File out\SHA256SUMS.txt
          Compress-Archive -Path out\* -DestinationPath mc_ctf_clean_module_release.zip -Force

      - name: Upload release zip
        uses: actions/upload-artifact@v4
        with:
          name: mc_ctf_clean_module_release
          path: mc_ctf_clean_module_release.zip
